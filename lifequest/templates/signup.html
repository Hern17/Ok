{% extends "base.html" %}
{% block content %}
<div class="auth-container">
  <div class="pixel-card pixel-border">
    <h1 class="pixel-title">тЦ╕ SIGN UP</h1>
    <form method="POST">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" class="pixel-input pixel-border" required>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" class="pixel-input pixel-border" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" class="pixel-input pixel-border" required>
      </div>
      <div class="field">
        <label>I am a...</label>
        <div class="role-group">
          <label class="role-opt"><input type="radio" name="role" value="candidate" checked onchange="toggleRole()"> ЁЯзС Candidate</label>
          <label class="role-opt"><input type="radio" name="role" value="employer" onchange="toggleRole()"> ЁЯПв Employer</label>
        </div>
      </div>
      <div id="candidate-fields">
        <div class="field">
          <label>Choose your avatar</label>
          <div class="emoji-picker">
            <input type="hidden" name="avatar" id="avatar-val" value="ЁЯзС">
            <div class="emoji-grid">
              {% for e in ['ЁЯзС','ЁЯСй','ЁЯзФ','ЁЯзЩ','ЁЯзЭ','ЁЯж╕','ЁЯСитАНЁЯТ╗','ЁЯСйтАНЁЯОУ','ЁЯСйтАНЁЯФм','ЁЯзСтАНЁЯОи','ЁЯзСтАНЁЯФз','ЁЯСитАНЁЯЪА'] %}
              <span class="emoji-opt {% if e == 'ЁЯзС' %}selected{% endif %}" data-emoji="{{ e }}" onclick="selectEmoji(this)">{{ e }}</span>
              {% endfor %}
            </div>
          </div>
        </div>
      </div>
      <div id="employer-fields" style="display:none">
        <div class="field">
          <label>Company Name</label>
          <input type="text" name="company_name" class="pixel-input pixel-border">
        </div>
        <div class="field">
          <label>Industry</label>
          <select name="industry" class="pixel-input pixel-border">
            <option value="">Select...</option>
            <option>Technology</option><option>Finance</option>
            <option>Healthcare</option><option>Education</option>
            <option>E-commerce</option><option>Consulting</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field">
          <label>Website</label>
          <input type="url" name="website" class="pixel-input pixel-border" placeholder="https://">
        </div>
        <div class="field">
          <label>Contact Email (public)</label>
          <input type="email" name="contact_email" class="pixel-input pixel-border">
        </div>
      </div>
      <button type="submit" class="pixel-btn pixel-border">тЦ╢ CREATE</button>
    </form>
    <p class="auth-link">Already registered? <a href="{{ url_for('login') }}">Login</a></p>
  </div>
</div>
<script>
function selectEmoji(el) {
  document.querySelectorAll('.emoji-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('avatar-val').value = el.dataset.emoji;
}
function toggleRole() {
  const emp = document.querySelector('[name=role]:checked').value === 'employer';
  document.getElementById('employer-fields').style.display = emp ? 'block' : 'none';
  document.getElementById('candidate-fields').style.display = emp ? 'none' : 'block';
}
</script>
{% endblock %}
