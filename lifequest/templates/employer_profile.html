{% extends "base.html" %}
{% block content %}
<div class="auth-container">
  <div class="pixel-card pixel-border">
    <h1 class="pixel-title">▸ COMPANY PROFILE</h1>
    <form method="POST">
      <div class="field">
        <label>Company Name</label>
        <input type="text" name="company_name" class="pixel-input pixel-border" value="{{ employer.company_name }}" required>
      </div>
      <div class="field">
        <label>Industry</label>
        <select name="industry" class="pixel-input pixel-border">
          <option value="">Select...</option>
          {% for opt in ['Technology','Finance','Healthcare','Education','E-commerce','Consulting','Other'] %}
          <option {% if employer.industry == opt %}selected{% endif %}>{{ opt }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label>Website</label>
        <input type="url" name="website" class="pixel-input pixel-border" value="{{ employer.website or '' }}">
      </div>
      <div class="field">
        <label>Description</label>
        <textarea name="description" class="pixel-textarea pixel-border" rows="4">{{ employer.description or '' }}</textarea>
      </div>
      <div class="field">
        <label>Contact Email (public)</label>
        <input type="email" name="contact_email" class="pixel-input pixel-border" value="{{ employer.contact_email or '' }}">
      </div>
      <button type="submit" class="pixel-btn pixel-border">▶ SAVE</button>
    </form>
  </div>
</div>
{% endblock %}
