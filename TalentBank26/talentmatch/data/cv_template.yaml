meta:
  name: "modern"
  label: "Modern Professional"
  font: "Libertinus Serif"
  font_size: "11pt"
  margin_x: "0.9cm"
  margin_y: "1.3cm"

skill_pool:
  - "Python"
  - "JavaScript"
  - "Java"
  - "SQL"
  - "HTML"
  - "CSS"
  - "React"
  - "Node.js"
  - "Docker"
  - "Kubernetes"
  - "AWS"
  - "Machine Learning"
  - "Data Analysis"
  - "Git"
  - "REST API"
  - "TypeScript"
  - "Angular"
  - "Vue"
  - "Flutter"
  - "Android"
  - "iOS"
  - "Swift"
  - "Kotlin"
  - "TensorFlow"
  - "PyTorch"
  - "Tableau"
  - "Power BI"
  - "Excel"
  - "Communication"
  - "Leadership"
  - "Project Management"
  - "Figma"
  - "Photoshop"
  - "Linux"
  - "C++"
  - "C#"
  - "Go"
  - "Ruby"
  - "PHP"
  - "MongoDB"
  - "PostgreSQL"
  - "Redis"
  - "GraphQL"
  - "CI/CD"
  - "Terraform"
  - "Agile"
  - "Scrum"
  - "Public Speaking"
  - "Writing"
  - "Research"

personality_questions:
  - id: recharge
    label: "How do you recharge?"
    options:
      - value: extrovert
        emoji: "🎉"
        label: "Social Butterfly"
        desc: "I gain energy from collaborating and interacting with others"
      - value: introvert
        emoji: "🧘"
        label: "Solo Deep-Thinker"
        desc: "I recharge best with focused solo work and quiet time"
      - value: ambivert
        emoji: "⚖️"
        label: "Balanced"
        desc: "I enjoy both collaboration and solo work in equal measure"
  - id: process
    label: "How do you process information?"
    options:
      - value: big-picture
        emoji: "🔭"
        label: "Big Picture Thinker"
        desc: "I focus on concepts, patterns, and future possibilities"
      - value: detail
        emoji: "🔍"
        label: "Detail-Oriented"
        desc: "I focus on facts, details, and practical realities"
  - id: decisions
    label: "How do you make decisions?"
    options:
      - value: analytical
        emoji: "🧠"
        label: "Head (Analytical)"
        desc: "I rely on logic, data, and objective analysis"
      - value: empathetic
        emoji: "💛"
        label: "Heart (Empathetic)"
        desc: "I consider people, values, and emotional impact"
  - id: approach
    label: "How do you approach work?"
    options:
      - value: planned
        emoji: "📋"
        label: "Planned & Organized"
        desc: "I prefer structure, schedules, and clear plans"
      - value: spontaneous
        emoji: "🎨"
        label: "Flexible & Spontaneous"
        desc: "I adapt on the fly and keep my options open"

sections:
  - id: about
    type: header
    icon: "👤"
    label: "About You"
    questionnaire:
      - key: full_name
        type: text
        label: "Full Name"
        placeholder: "e.g. Sarah Lim"
        required: true
      - key: email
        type: text
        label: "Email"
        placeholder: "e.g. sarah@example.com"
      - key: mobile
        type: text
        label: "Mobile Number"
        placeholder: "e.g. +6012-345-6789"
      - key: location
        type: text
        label: "Location"
        placeholder: "e.g. Kuala Lumpur, Malaysia"
      - key: social_media
        type: textarea
        label: "Social Media (one link per line)"
        placeholder: "https://linkedin.com/in/sarah\nhttps://github.com/sarah"
      - key: about
        type: textarea
        label: "Professional Summary"
        placeholder: "Brief summary of your background and goals..."
      - key: experience
        type: select
        label: "Experience Level"
        options:
          - value: entry
            label: "Entry Level"
          - value: mid
            label: "Mid Level"
          - value: senior
            label: "Senior Level"
          - value: lead
            label: "Lead / Manager"

  - id: education
    type: entries
    icon: "🎓"
    label: "Education Background"
    questionnaire:
      - key: education
        type: entries
        label: "Add Education"
        hint: "Add each institution you studied at"
        fields:
          - key: stage
            type: select
            label: "Stage"
            options:
              - value: high_school
                label: "High School"
              - value: pre_u
                label: "Pre-University"
              - value: diploma
                label: "Diploma"
              - value: bachelor
                label: "Bachelor's Degree"
              - value: master
                label: "Master's Degree"
              - value: phd
                label: "PhD / Doctorate"
          - key: institution
            type: text
            label: "Institution Name"
            placeholder: "e.g. Universiti Malaya"
          - key: course
            type: text
            label: "Course Studied"
            placeholder: "e.g. Bachelor of Computer Science"
          - key: results
            type: text
            label: "Results / GPA"
            placeholder: "e.g. 3.8 / 4.0"
          - key: subjects
            type: text
            label: "Subjects (max 4, comma separated)"
            placeholder: "e.g. Data Structures, Algorithms, Calculus"
          - key: activities
            type: textarea
            label: "Activities Besides Studying"
            placeholder: "Clubs, sports, volunteering..."
          - key: location
            type: text
            label: "Location"
            placeholder: "e.g. Kuala Lumpur"
          - key: duration
            type: text
            label: "Duration"
            placeholder: "e.g. Sep 2021 - Jun 2025"

  - id: work_experience
    type: entries
    icon: "💼"
    label: "Work Experience"
    questionnaire:
      - key: work_experience
        type: entries
        label: "Add Role"
        hint: "Each entry = one role at an organisation"
        fields:
          - key: organisation
            type: text
            label: "Organisation"
            placeholder: "e.g. TechCorp"
          - key: role
            type: text
            label: "Role / Position"
            placeholder: "e.g. Software Engineering Intern"
          - key: achievements
            type: textarea
            label: "Achievements / What You Learned"
            placeholder: "Describe your impact, projects, and learnings..."
          - key: skills_obtained
            type: text
            label: "Skills Obtained (comma separated)"
            placeholder: "e.g. Python, Docker, Team Leadership"
          - key: location
            type: text
            label: "Location"
            placeholder: "e.g. Kuala Lumpur"
          - key: duration
            type: text
            label: "Duration"
            placeholder: "e.g. Jun 2024 - Aug 2024"

  - id: leadership
    type: entries
    icon: "🌟"
    label: "Leadership & Extra-Curricular"
    questionnaire:
      - key: leadership_cert
        type: file-upload
        label: "Upload Leadership Certificate (optional)"
        hint: "Upload PDF cert — extracts skills automatically"
      - key: leadership
        type: entries
        label: "Add Activity"
        hint: "Clubs, societies, community work, sports"
        fields:
          - key: organisation
            type: text
            label: "Organisation / Activity Name"
            placeholder: "e.g. Debate Club"
          - key: role
            type: text
            label: "Role"
            placeholder: "e.g. President"
          - key: note
            type: textarea
            label: "Note / What You Learned"
            placeholder: "Key experiences and takeaways..."
          - key: location
            type: text
            label: "Location"
            placeholder: "e.g. Universiti Malaya"
          - key: duration
            type: text
            label: "Duration"
            placeholder: "e.g. 2023 - 2024"

  - id: projects
    type: entries
    icon: "🚀"
    label: "Projects"
    questionnaire:
      - key: project_cert
        type: file-upload
        label: "Upload Project Certificate (optional)"
        hint: "Upload PDF cert — extracts skills automatically"
      - key: projects
        type: entries
        label: "Add Project"
        hint: "Personal, academic, open-source projects"
        fields:
          - key: name
            type: text
            label: "Project Name"
            placeholder: "e.g. TalentMatch AI"
          - key: type
            type: select
            label: "Project Type"
            options:
              - value: personal
                label: "Personal Project"
              - value: academic
                label: "Academic / Coursework"
              - value: professional
                label: "Professional / Work"
              - value: open_source
                label: "Open Source"
              - value: volunteer
                label: "Volunteer"
          - key: achievements
            type: textarea
            label: "Note / Achievements"
            placeholder: "What you built, learned, and accomplished..."
          - key: duration
            type: text
            label: "Duration"
            placeholder: "e.g. Jan 2025 - Mar 2025"
          - key: proof_link
            type: text
            label: "Link / ID / Proof (optional)"
            placeholder: "e.g. https://github.com/user/project"

  - id: skills
    type: tags
    icon: "🛠️"
    label: "Skills"
    questionnaire:
      - key: skills
        type: checkbox-grid
        label: "Select Your Skills"
        hint: "Check all skills you possess"
      - key: custom_skills
        type: custom-tags
        label: "Add Custom Skills"
        placeholder: "Type a skill and press Enter..."

  - id: career
    type: career
    icon: "🎯"
    label: "Career Interests"
    questionnaire:
      - key: target_role
        type: occupation-search
        label: "Dream Job Role"
        placeholder: "Search from 1385 occupations..."
        required: true
      - key: industry
        type: select
        label: "Preferred Industry"
        options:
          - value: "technology"
            label: "Technology"
          - value: "finance"
            label: "Finance & Banking"
          - value: "healthcare"
            label: "Healthcare"
          - value: "education"
            label: "Education"
          - value: "manufacturing"
            label: "Manufacturing"
          - value: "retail"
            label: "Retail & E-commerce"
          - value: "media"
            label: "Media & Entertainment"
          - value: "consulting"
            label: "Consulting"
          - value: "government"
            label: "Government"
          - value: "nonprofit"
            label: "Non-Profit"
      - key: work_style
        type: select
        label: "Work Preference"
        options:
          - value: remote
            label: "Fully Remote"
          - value: hybrid
            label: "Hybrid"
          - value: onsite
            label: "On-site"

  - id: personality
    type: personality
    icon: "🧠"
    label: "Work Personality"
